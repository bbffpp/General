<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 禁用页面缓存 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>家庭共享留言板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", Arial, sans-serif;
        }
        body {
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .title {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            color: #333;
        }
        .link-area {
            text-align: center;
            margin-bottom: 15px;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 0 5px;
            background: #1a73e8;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }
        .btn.edit {
            background: #27ae60;
        }
        .btn.refresh {
            background: #f39c12;
        }
        .btn.republish {
            background: #e74c3c;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .sheet-box {
            width: 100%;
            height: 700px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
        }
        .tip {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin: 10px 0 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">🏠 家庭共享留言板（Google 表格）</div>

        <div class="link-area">
            <a href="https://bbffpp.github.io/leave-board/health.html" target="_blank" class="btn">
                查看長者健康指南
            </a>
            <a href="https://docs.google.com/spreadsheets/d/1W0oZyWdN6BdP7c4xzdcXIerk0cuf1hvcDLLO8ZO7U0Y/edit" target="_blank" class="btn edit">
                點此進入表格編輯
            </a>
            <!-- 新增：快速跳转到发布设置的按钮 -->
            <a href="https://docs.google.com/spreadsheets/d/1W0oZyWdN6BdP7c4xzdcXIerk0cuf1hvcDLLO8ZO7U0Y/publish" target="_blank" class="btn republish">
                🚀 重新發布表格
            </a>
            <button class="btn refresh" onclick="refreshSheet()">
                🔄 刷新表格數據
            </button>
        </div>

        <div class="tip">
            💡 提示：修改表格後，先點「重新發布表格」→ 再點「刷新表格數據」，即可看到最新內容
        </div>

        <iframe 
            id="sheetIframe"
            class="sheet-box"
            src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQVeU4IFjeGb6xZiN8kcaXqIRRoXs5SP74tYXUYANIWP8SGUKwC4j9LAlLYzaYASdh9Ry1Xp9gCkvo8/pubhtml?widget=true&amp;headers=false"
            frameborder="0"
            allowfullscreen
            <!-- 禁用iframe缓存 -->
            fetchpriority="high"
            referrerpolicy="no-referrer">
        </iframe>
    </div>

    <script>
        function refreshSheet() {
            const iframe = document.getElementById('sheetIframe');
            iframe.style.opacity = "0.5";
            // 彻底重置src，不保留任何缓存参数
            const baseSrc = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQVeU4IFjeGb6xZiN8kcaXqIRRoXs5SP74tYXUYANIWP8SGUKwC4j9LAlLYzaYASdh9Ry1Xp9gCkvo8/pubhtml?widget=true&amp;headers=false";
            // 加随机数+时间戳，双重避免缓存
            const newSrc = baseSrc + '&_t=' + new Date().getTime() + '&_r=' + Math.random();
            iframe.src = 'about:blank'; // 先清空
            setTimeout(() => {
                iframe.src = newSrc;
            }, 100);
            
            iframe.onload = function() {
                iframe.style.opacity = "1";
                alert("✅ 表格數據已刷新！");
            }
            // 额外强制刷新页面缓存（可选）
            window.location.reload(false);
        }
    </script>
</body>
</html>
